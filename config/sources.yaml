      supports_listing_pages: true
      supports_detail_pages: true
      supports_server_side_html: true
      requires_browser: false
      supports_pagination: true
      supports_feature_filters: true
    extraction_hints:
      query_params:
        status: "locacao"
        type: "residencial"
      notable_features:
        - "área gourmet"
        - "churrasqueira"
        - "closet"
        - "cozinha planejada"
        - "escritório"
        - "piscina"
        - "sacada"
        - "suíte"
