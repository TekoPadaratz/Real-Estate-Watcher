  - id: "nalesso"
    name: "Nalesso Imóveis"
    base_url: "https://nalessoimoveis.com.br"
    enabled: true
    strategy: "http"
    platform_family: "nalesso"
    experimental: false
    city_scope: ["Santo Antônio da Platina"]
    seeds:
      - "https://nalessoimoveis.com.br/busca/?status=locacao&type=residencial"
