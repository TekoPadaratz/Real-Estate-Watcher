    enabled: true
    strategy: "browser"
    platform_family: "imobzi"
    experimental: false
    city_scope: ["Santo Antônio da Platina"]
    seeds:
      - "https://www.imoveispadilhaeferrari.com.br/buscar?availability=rent&city=Santo+Ant%C3%B4nio+da+Platina&property_type=Casa&search_type=properties&show_map=false&order=most_relevant&direction=desc"
